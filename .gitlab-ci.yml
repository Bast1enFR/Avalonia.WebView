stages:
  - test-runner
  - build
  - pack
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_NOLOGO: "true"
  GIT_DEPTH: 0
  CONFIGURATION: "Release"

default:
  tags:
    - SRV-DVT-2K19

test-runner:
  stage: test-runner
  script:
    - write-host 'Hello from Windows Runner!'

# Étape 1 : Build (Windows)
build:
  stage: build
  script:
    - echo "=== Clean ==="
    - dotnet clean Avalonia.WebView.NoSamples.sln
    - echo "=== Restore workloads ==="
    - dotnet workload restore
    - echo "=== Restore solution ==="
    - dotnet restore Avalonia.WebView.NoSamples.sln
    - echo "=== Build solution ==="
    - dotnet build Avalonia.WebView.NoSamples.sln -c $CONFIGURATION
    - echo "=== Pack NuGet ==="
    - |
      if ($env:CI_COMMIT_TAG -and $env:CI_COMMIT_TAG.StartsWith("v")) {
        $Version = $env:CI_COMMIT_TAG.Substring(1)
      } else {
        $Version = "0.0.0-ci.$env:CI_PIPELINE_IID"
      }

      dotnet msbuild Avalonia.WebView.NoSamples.sln /t:Pack /p:Configuration=$env:CONFIGURATION /p:PackageVersion=$Version /p:PackageOutputPath="$env:CI_PROJECT_DIR/_nuget"
  artifacts:
    paths:
      - _nuget/*.nupkg
    expire_in: 1 hour
  dependencies:
    - test-runner

# Étape 4 : publier dans le feed NuGet de GitLab
publish:
  stage: publish
  script:
    - dotnet nuget push "_nuget\*.nupkg" --source "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/nuget/index.json" --api-key "$CI_JOB_TOKEN"
  dependencies:
    - build
